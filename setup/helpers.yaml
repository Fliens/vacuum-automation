# Home Assistant Helper für Zustandsspeicherung
# Füge dies zu configuration.yaml hinzu oder erstelle über UI

input_text:
  vacuum_automation_state:
    name: Vacuum Automation State
    max: 1024
    initial: "{}"

input_boolean:
  vacuum_automation_enabled:
    name: Vacuum Automation Enabled
    icon: mdi:robot-vacuum
  vacuum_automation_learning_enabled:
    name: Vacuum Automation Learning Enabled
    icon: mdi:brain
  vacuum_automation_bad_enabled:
    name: Vacuum Bad Enabled
    icon: mdi:shower
  vacuum_automation_kueche_enabled:
    name: Vacuum Kueche Enabled
    icon: mdi:silverware-fork-knife
  vacuum_automation_wohnzimmer_enabled:
    name: Vacuum Wohnzimmer Enabled
    icon: mdi:sofa
  vacuum_automation_schlafzimmer_enabled:
    name: Vacuum Schlafzimmer Enabled
    icon: mdi:bed-king-outline

input_number:
  vacuum_automation_start_hour:
    name: Vacuum Automation Start Hour
    min: 0
    max: 23
    step: 1
    mode: box
    initial: 8
  vacuum_automation_end_hour:
    name: Vacuum Automation End Hour
    min: 1
    max: 23
    step: 1
    mode: box
    initial: 22
  vacuum_automation_return_buffer:
    name: Vacuum Automation Return Buffer
    min: 0
    max: 30
    step: 1
    unit_of_measurement: min
    mode: slider
    initial: 5
  vacuum_automation_fallback_speed:
    name: Vacuum Automation Fallback Speed
    min: 5
    max: 130
    step: 1
    unit_of_measurement: km/h
    mode: slider
    initial: 30
  vacuum_automation_default_travel_time:
    name: Vacuum Automation Default Travel Time
    min: 5
    max: 240
    step: 5
    unit_of_measurement: min
    mode: slider
    initial: 60
  vacuum_automation_bad_weight:
    name: Vacuum Bad Weight
    min: 0.1
    max: 3
    step: 0.05
    mode: box
    initial: 1.4
  vacuum_automation_bad_interval_h:
    name: Vacuum Bad Interval
    min: 6
    max: 168
    step: 1
    unit_of_measurement: h
    mode: box
    initial: 24
  vacuum_automation_bad_duration_min:
    name: Vacuum Bad Duration
    min: 1
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 15
  vacuum_automation_kueche_weight:
    name: Vacuum Kueche Weight
    min: 0.1
    max: 3
    step: 0.05
    mode: box
    initial: 1.2
  vacuum_automation_kueche_interval_h:
    name: Vacuum Kueche Interval
    min: 6
    max: 168
    step: 1
    unit_of_measurement: h
    mode: box
    initial: 48
  vacuum_automation_kueche_duration_min:
    name: Vacuum Kueche Duration
    min: 1
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 12
  vacuum_automation_wohnzimmer_weight:
    name: Vacuum Wohnzimmer Weight
    min: 0.1
    max: 3
    step: 0.05
    mode: box
    initial: 1.0
  vacuum_automation_wohnzimmer_interval_h:
    name: Vacuum Wohnzimmer Interval
    min: 6
    max: 168
    step: 1
    unit_of_measurement: h
    mode: box
    initial: 72
  vacuum_automation_wohnzimmer_duration_min:
    name: Vacuum Wohnzimmer Duration
    min: 1
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 20
  vacuum_automation_schlafzimmer_weight:
    name: Vacuum Schlafzimmer Weight
    min: 0.1
    max: 3
    step: 0.05
    mode: box
    initial: 1.0
  vacuum_automation_schlafzimmer_interval_h:
    name: Vacuum Schlafzimmer Interval
    min: 6
    max: 168
    step: 1
    unit_of_measurement: h
    mode: box
    initial: 72
  vacuum_automation_schlafzimmer_duration_min:
    name: Vacuum Schlafzimmer Duration
    min: 1
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 18
