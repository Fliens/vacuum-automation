title: Vacuum Automation
# Adjust example entities if your setup uses different IDs:
# - vacuum.robot_vacuum
# - sensor.travel_time_to_home
views:
  - title: Vacuum
    path: vacuum-automation
    icon: mdi:robot-vacuum-variant
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Vacuum Automation
            heading_style: title
            icon: mdi:robot-vacuum-variant
          - type: tile
            entity: input_boolean.vacuum_automation_enabled
            name: Automatik
            color: green
          - type: tile
            entity: input_boolean.vacuum_automation_learning_enabled
            name: Lernlogik
            color: blue
          - type: tile
            entity: sensor.vacuum_automation_status
            name: Status
            color: teal
          - type: tile
            entity: sensor.vacuum_automation_active_room
            name: Aktiver Raum
            color: amber
          - type: tile
            entity: sensor.vacuum_automation_next_room
            name: Naechster Raum
            color: indigo
          - type: tile
            entity: sensor.vacuum_automation_travel_time
            name: Rueckreisezeit
            color: purple
          - type: tile
            entity: sensor.vacuum_automation_return_window
            name: Reinigungsfenster
            color: cyan
          - type: tile
            entity: sensor.vacuum_automation_weekly_runs
            name: Diese Woche
            color: pink
          - type: tile
            entity: sensor.vacuum_automation_weekly_minutes
            name: Wochenminuten
            color: red

      - type: grid
        cards:
          - type: markdown
            content: >-
              {% set status = states('sensor.vacuum_automation_status') %}
              {% set people = state_attr('sensor.vacuum_automation_status', 'presence_summary') or [] %}
              {% set cleaned = state_attr('sensor.vacuum_automation_status', 'cleaned_during_absence') or [] %}
              {% set weekly = state_attr('sensor.vacuum_automation_history', 'weekly_stats') or [] %}
              ## Live

              **Status:** {{ status }}

              **Bewohner:**{% for person in people %}
              - {{ person.entity_id }}: {{ person.state }}{% endfor %}

              **Abwesend seit:** {{ state_attr('sensor.vacuum_automation_status', 'away_since') or 'Niemand komplett weg' }}

              **Schon gereinigt:** {{ cleaned | join(', ') if cleaned else 'Noch nichts' }}

              **Aktuelle Woche:** {% if weekly %}{{ weekly[0].runs }} Laeufe / {{ weekly[0].minutes }} min{% else %}Noch keine Daten{% endif %}
          - type: entities
            title: Uebersicht
            show_header_toggle: false
            entities:
              - entity: vacuum.robot_vacuum
                name: Staubsauger
              - entity: sensor.vacuum_automation_status
                name: App-Status
              - entity: sensor.vacuum_automation_travel_time
                name: Rueckreisezeit
              - entity: sensor.vacuum_automation_return_window
                name: Verfuegbares Fenster
              - entity: sensor.vacuum_automation_distance_to_home
                name: Distanz
              - entity: sensor.travel_time_to_home
                name: Waze ETA
          - type: history-graph
            title: ETA und Fenster
            hours_to_show: 24
            entities:
              - entity: sensor.vacuum_automation_travel_time
                name: Reisezeit
              - entity: sensor.vacuum_automation_return_window
                name: Fenster

      - type: grid
        cards:
          - type: markdown
            content: >-
              {% set queue = state_attr('sensor.vacuum_automation_status', 'room_queue') or [] %}
              ## Raumplanung

              | Raum | Aktiv | Prio | Intervall | Konfig | Gelernt | Effektiv | Passt |
              |---|---|---:|---:|---:|---:|---:|---|
              {% for item in queue %}
              | {{ item.room }} | {{ 'Ja' if item.enabled else 'Nein' }} | {{ item.priority }} | {{ item.interval_h }} h | {{ item.configured_duration_min }} | {{ item.learned_duration_min if item.learned_duration_min is not none else '-' }} | {{ item.effective_duration_min }} | {{ 'Ja' if item.fits_now else 'Nein' }} |
              {% endfor %}
          - type: markdown
            content: >-
              {% set weekly = state_attr('sensor.vacuum_automation_history', 'weekly_stats') or [] %}
              ## Wochenstatistik

              | Woche | Laeufe | Minuten | Raeume |
              |---|---:|---:|---|
              {% for item in weekly %}
              | {{ item.week }} | {{ item.runs }} | {{ item.minutes }} | {{ item.rooms | join(', ') }} |
              {% endfor %}
          - type: markdown
            content: >-
              {% set recent = state_attr('sensor.vacuum_automation_history', 'recent_runs') or [] %}
              ## Letzte Laeufe

              | Ende | Raum | Ergebnis | Minuten |
              |---|---|---|---:|
              {% for item in recent %}
              | {{ item.finished_at or '-' }} | {{ item.room }} | {{ item.outcome }} | {{ item.actual_duration_min or 0 }} |
              {% endfor %}

      - type: grid
        cards:
          - type: heading
            heading: Steuerung
            heading_style: subtitle
          - type: entities
            title: Globale Regler
            show_header_toggle: false
            entities:
              - input_boolean.vacuum_automation_enabled
              - input_boolean.vacuum_automation_learning_enabled
              - input_number.vacuum_automation_start_hour
              - input_number.vacuum_automation_end_hour
              - input_number.vacuum_automation_return_buffer
              - input_number.vacuum_automation_fallback_speed
              - input_number.vacuum_automation_default_travel_time
          - type: conditional
            conditions:
              - entity: sensor.vacuum_automation_active_room
                state_not: Keine
            card:
              type: markdown
              content: >-
                ## Laufende Reinigung

                **Raum:** {{ states('sensor.vacuum_automation_active_room') }}

                **Restzeit:** {{ state_attr('sensor.vacuum_automation_active_room', 'remaining_min') }} min

                **Geplant:** {{ state_attr('sensor.vacuum_automation_active_room', 'planned_duration_min') }} min

                **Rueckkehrfenster:** {{ states('sensor.vacuum_automation_return_window') }} min

      - type: grid
        cards:
          - type: entities
            title: Raum Bad
            show_header_toggle: false
            entities:
              - input_boolean.vacuum_automation_bad_enabled
              - input_number.vacuum_automation_bad_weight
              - input_number.vacuum_automation_bad_interval_h
              - input_number.vacuum_automation_bad_duration_min
          - type: entities
            title: Raum Kueche
            show_header_toggle: false
            entities:
              - input_boolean.vacuum_automation_kueche_enabled
              - input_number.vacuum_automation_kueche_weight
              - input_number.vacuum_automation_kueche_interval_h
              - input_number.vacuum_automation_kueche_duration_min
          - type: entities
            title: Raum Wohnzimmer
            show_header_toggle: false
            entities:
              - input_boolean.vacuum_automation_wohnzimmer_enabled
              - input_number.vacuum_automation_wohnzimmer_weight
              - input_number.vacuum_automation_wohnzimmer_interval_h
              - input_number.vacuum_automation_wohnzimmer_duration_min
          - type: entities
            title: Raum Schlafzimmer
            show_header_toggle: false
            entities:
              - input_boolean.vacuum_automation_schlafzimmer_enabled
              - input_number.vacuum_automation_schlafzimmer_weight
              - input_number.vacuum_automation_schlafzimmer_interval_h
              - input_number.vacuum_automation_schlafzimmer_duration_min

      - type: grid
        cards:
          - type: heading
            heading: Technische Sensoren
            heading_style: subtitle
          - type: entities
            title: Vom AppDaemon-Addon erzeugt
            show_header_toggle: false
            entities:
              - sensor.vacuum_automation_status
              - sensor.vacuum_automation_active_room
              - sensor.vacuum_automation_next_room
              - sensor.vacuum_automation_travel_time
              - sensor.vacuum_automation_return_window
              - sensor.vacuum_automation_distance_to_home
              - sensor.vacuum_automation_weekly_runs
              - sensor.vacuum_automation_weekly_minutes
              - sensor.vacuum_automation_history
