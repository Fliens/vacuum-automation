title: Vacuum Automation Mushroom
# Requires custom cards:
# - Mushroom
# - ApexCharts Card
views:
  - title: Vacuum
    path: vacuum-automation-mushroom
    icon: mdi:robot-vacuum-variant
    badges: []
    cards:
      - type: custom:mushroom-title-card
        title: Vacuum Automation
        subtitle: Ankunftsbasierte Reinigung mit Lernlogik und Wochenstatistik

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.vacuum_automation_enabled
            name: Automatik
            icon_color: green
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: input_boolean.vacuum_automation_learning_enabled
            name: Lernlogik
            icon_color: blue
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: sensor.vacuum_automation_status
            name: Status
            icon_color: teal

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.vacuum_automation_active_room
            icon_color: amber
          - type: entity
            entity: sensor.vacuum_automation_next_room
            icon_color: indigo
          - type: entity
            entity: sensor.vacuum_automation_travel_time
            icon_color: purple
          - type: entity
            entity: sensor.vacuum_automation_return_window
            icon_color: cyan
          - type: entity
            entity: sensor.vacuum_automation_weekly_runs
            icon_color: pink

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Live-Zustand
            secondary: >-
              Status: {{ states('sensor.vacuum_automation_status') }}
              • Raum: {{ states('sensor.vacuum_automation_active_room') }}
              • Naechster Raum: {{ states('sensor.vacuum_automation_next_room') }}
            icon: mdi:robot-vacuum
            icon_color: teal
            multiline_secondary: true
          - type: custom:mushroom-template-card
            primary: Bewohner
            secondary: >-
              {% for person in state_attr('sensor.vacuum_automation_status', 'presence_summary') or [] %}
              {{ person.entity_id }}: {{ person.state }}{% if not loop.last %} • {% endif %}
              {% endfor %}
            icon: mdi:account-group
            icon_color: blue
            multiline_secondary: true
          - type: custom:mushroom-template-card
            primary: Rueckweg
            secondary: >-
              ETA {{ states('sensor.vacuum_automation_travel_time') }} min
              • Distanz {{ states('sensor.vacuum_automation_distance_to_home') }} km
            icon: mdi:car-clock
            icon_color: purple
          - type: custom:mushroom-template-card
            primary: Wochenleistung
            secondary: >-
              {{ states('sensor.vacuum_automation_weekly_runs') }} Laeufe
              • {{ states('sensor.vacuum_automation_weekly_minutes') }} min
            icon: mdi:chart-box
            icon_color: pink

      - type: custom:apexcharts-card
        header:
          show: true
          title: Wochenuebersicht
        graph_span: 7d
        series:
          - entity: sensor.vacuum_automation_weekly_runs
            name: Laeufe
          - entity: sensor.vacuum_automation_weekly_minutes
            name: Minuten

      - type: markdown
        content: >-
          {% set queue = state_attr('sensor.vacuum_automation_status', 'room_queue') or [] %}
          ## Raumranking

          | Raum | Prio | Konfig | Gelernt | Effektiv | Passt |
          |---|---:|---:|---:|---:|---|
          {% for item in queue %}
          | {{ item.room }} | {{ item.priority }} | {{ item.configured_duration_min }} | {{ item.learned_duration_min if item.learned_duration_min is not none else '-' }} | {{ item.effective_duration_min }} | {{ 'Ja' if item.fits_now else 'Nein' }} |
          {% endfor %}

      - type: markdown
        content: >-
          {% set weekly = state_attr('sensor.vacuum_automation_history', 'weekly_stats') or [] %}
          {% set recent = state_attr('sensor.vacuum_automation_history', 'recent_runs') or [] %}
          ## Verlauf

          **Wochen**
          {% for item in weekly %}
          - {{ item.week }}: {{ item.runs }} Laeufe / {{ item.minutes }} min / {{ item.rooms | join(', ') }}
          {% endfor %}

          **Letzte Laeufe**
          {% for item in recent %}
          - {{ item.finished_at or '-' }} · {{ item.room }} · {{ item.outcome }} · {{ item.actual_duration_min or 0 }} min
          {% endfor %}

      - type: entities
        title: Globale Regler
        entities:
          - input_boolean.vacuum_automation_enabled
          - input_boolean.vacuum_automation_learning_enabled
          - input_number.vacuum_automation_start_hour
          - input_number.vacuum_automation_end_hour
          - input_number.vacuum_automation_return_buffer
          - input_number.vacuum_automation_fallback_speed
          - input_number.vacuum_automation_default_travel_time

      - type: grid
        columns: 2
        square: false
        cards:
          - type: entities
            title: Bad
            entities:
              - input_boolean.vacuum_automation_bad_enabled
              - input_number.vacuum_automation_bad_weight
              - input_number.vacuum_automation_bad_interval_h
              - input_number.vacuum_automation_bad_duration_min
          - type: entities
            title: Kueche
            entities:
              - input_boolean.vacuum_automation_kueche_enabled
              - input_number.vacuum_automation_kueche_weight
              - input_number.vacuum_automation_kueche_interval_h
              - input_number.vacuum_automation_kueche_duration_min
          - type: entities
            title: Wohnzimmer
            entities:
              - input_boolean.vacuum_automation_wohnzimmer_enabled
              - input_number.vacuum_automation_wohnzimmer_weight
              - input_number.vacuum_automation_wohnzimmer_interval_h
              - input_number.vacuum_automation_wohnzimmer_duration_min
          - type: entities
            title: Schlafzimmer
            entities:
              - input_boolean.vacuum_automation_schlafzimmer_enabled
              - input_number.vacuum_automation_schlafzimmer_weight
              - input_number.vacuum_automation_schlafzimmer_interval_h
              - input_number.vacuum_automation_schlafzimmer_duration_min
